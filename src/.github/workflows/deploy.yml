name: Build and Deploy Hugo Site

on:
  push:
    branches: ["main"]
    paths-ignore:
      - '.nojekyll'
      - '404.html'
      - 'categories/**'
      - 'page/**'
      - 'posts/**'
      - 'scss/**'
      - 'tags/**'
      - 'ts/**'
      - 'index.html'
      - 'index.xml'
      - 'sitemap.xml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "hugo-deploy"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.161.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Clone theme
        run: |
          git clone --depth=1 https://github.com/CaiJimmy/hugo-theme-stack src/themes/hugo-theme-stack

      - name: Build with Hugo
        working-directory: src
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "https://18235859453.github.io/"

      - name: Deploy to root
        run: |
          rm -rf categories tags posts page index.html index.xml sitemap.xml 404.html scss ts
          cp -r src/public/* .
          rm -rf src/public/ src/themes/
          echo "" > .nojekyll
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Auto-deploy: Hugo build $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
